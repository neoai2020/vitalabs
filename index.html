<!doctype html>
<html lang="en-GB" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Peptiva — UK peptide quiz funnel. Match goals to verified catalogue SKUs (research use only)."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@600;700;800;900&display=swap"

    />

    <script src="https://sdk.sandbox.uprails.com/web/0.127.0/v1/HyperLoader.js"></script>
    <script>
      (function() {
        var t = localStorage.getItem('peptiva-theme');
        if (t) document.documentElement.setAttribute('data-theme', t);
        else document.documentElement.setAttribute('data-theme', 'light');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
